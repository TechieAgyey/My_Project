{% extends "dashboard.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 50vh;">
    <div style="background-color: #ffffff; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #2b6cb0;">
        <h2 style="color: #1a365d; margin-top: 0; margin-bottom: 10px; font-size: 24px; font-weight: 700; text-align: center;">Welcome Back</h2>
        <p style="color: #718096; font-size: 14px; text-align: center; margin-bottom: 25px;">Please enter your details to sign in.</p>
        
        <form method="POST">
            {% csrf_token %}
            
            <!-- Username Field -->
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">Username</label>
                <input type="text" name="username" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px;">
            </div>

            <!-- Password Field -->
            <div style="margin-bottom: 10px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px;">
            </div>

            <!-- Forgot Password Placeholder -->
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" style="color: #2b6cb0; font-size: 12px; text-decoration: none; font-weight: 600;">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" style="width: 100%; background-color: #2b6cb0; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 15px; transition: background-color 0.2s;">
                Sign In
            </button>

            <!-- Link to Signup -->
            <div style="margin-top: 20px; text-align: center; font-size: 13px; color: #718096;">
                Don't have an account? 
                <a href="/signup" style="color: #2b6cb0; text-decoration: none; font-weight: 700;">Sign up</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
