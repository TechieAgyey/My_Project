{% extends "dashboard.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 50vh;">
    <div style="background-color: #ffffff; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #2b6cb0;">
        <h2 style="color: #1a365d; margin-top: 0; margin-bottom: 20px; font-size: 24px; font-weight: 700; text-align: center;">Create Account</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">First Name</label>
                <input type="text" name="first_name" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">Last Name</label>
                <input type="text" name="last_name" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">Username</label>
                <input type="text" name="username" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 5px;">Password</label>
                <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box;">
            </div>

            <button type="submit" style="width: 100%; background-color: #2b6cb0; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer;">
                Sign Up
            </button>
        </form>
    </div>
</div>
{% endblock %}
