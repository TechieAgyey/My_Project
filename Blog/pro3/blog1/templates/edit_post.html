{% extends 'base.html' %}
{% block content %}
<div class="block">
    <h2>Edit Post</h2>
    <form method="POST">
        {% csrf_token %}
        <textarea name="message" style="width:100%; height: 80px; padding: 10px;">{{ post.message }}</textarea>
        <button type="submit" style="width:100%; padding:10px; background:#28a745; color:white; border:none; margin-top:10px; border-radius: 4px;">Save Changes</button>
        <a href="{% url 'dashboard' %}" style="display:block; text-align:center; margin-top:10px; color:#666;">Cancel</a>
    </form>
</div>
{% endblock %}
